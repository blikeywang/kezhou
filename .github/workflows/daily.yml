name: daily-refresh

# 每天刷新一次数据 → 重算衍生曲线 → 注入 app.html → 部署到 GitHub Pages。
# 用户永远打开的是静态页;不做实时查询。
on:
  push:
    branches: [main]
    paths:
      - "pipeline/daily/**"
      - "portal/**"
      - "docs/METHODS_AND_SOURCES.md"
      - "docs/TRADERHOME_PRODUCT_SYSTEM.md"
      - "README.md"
      - ".github/workflows/daily.yml"
  schedule:
    - cron: "30 6 * * *"   # 每天 06:30 UTC(美股收盘后;加密 24h)
  workflow_dispatch: {}     # 也可在 Actions 页面手动触发

permissions:
  contents: write           # 提交刷新后的 app.html
  pages: write              # 部署 Pages
  id-token: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: pip install -r pipeline/daily/requirements.txt

      - name: Run V2.1 regression tests
        run: python -m unittest pipeline.daily.test_v21

      - name: Run TraderHome portal tests
        run: python -m unittest portal.test_portal

      - name: Run TradeReview engine tests
        run: node --test portal/test_review_engine.mjs portal/test_review_community.mjs

      - name: Refresh data (fetch + build + inject)
        run: python pipeline/daily/run.py

      - name: Commit refreshed app.html
        run: |
          git config user.name  "kezhou-bot"
          git config user.email "kezhou-bot@users.noreply.github.com"
          git add prototype/app.html
          git commit -m "chore: daily data refresh $(date -u +%F)" || echo "no changes to commit"
          git push || echo "nothing to push"

      - name: Prepare static site
        run: python portal/build_site.py --output _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
