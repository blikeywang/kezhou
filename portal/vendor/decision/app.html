<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加密评审团 · 实时版</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --border:#2a3240;
    --txt:#e6edf3; --muted:#8b949e; --long:#2ea043; --short:#e5534b;
    --neu:#6e7681; --warn:#d29922; --na:#484f58; --accent:#3b82f6;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    font-size:14px;line-height:1.5}
  .wrap{max-width:1180px;margin:0 auto;padding:20px}
  header h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px}
  .status{font-size:12px;margin:6px 0}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .dot.ok{background:var(--long)} .dot.bad{background:var(--short)} .dot.load{background:var(--warn)}
  .disclaimer{background:#2d2418;border:1px solid #5c4a1f;color:#e3c07a;
    padding:8px 12px;border-radius:8px;font-size:12.5px;margin:12px 0}
  .ctrls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:12px 0}
  select,.btn{background:var(--panel2);border:1px solid var(--border);color:var(--txt);
    padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12.5px}
  .btn:hover,select:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  label.chk{font-size:12.5px;color:var(--muted);cursor:pointer;user-select:none}
  .levels{display:flex;flex-wrap:wrap;gap:8px 18px;font-size:12.5px;color:var(--muted);
    background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin:6px 0}
  .levels b{color:var(--txt)}
  /* EV 体检卡 */
  .evcard{border-radius:16px;padding:16px 18px;margin:8px 0 12px;border:1px solid var(--border);background:var(--panel)}
  .evcard.go{border-color:#2ea04366;background:linear-gradient(180deg,rgba(46,160,67,.09),transparent)}
  .evcard.caution{border-color:#d2992255;background:linear-gradient(180deg,rgba(210,153,34,.08),transparent)}
  .evcard.avoid{border-color:var(--border);background:var(--panel);opacity:.92}
  .ev-top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .ev-dir{font-size:24px;font-weight:800}
  .ev-light{font-size:12.5px;font-weight:700;padding:4px 11px;border-radius:20px;white-space:nowrap}
  .lg-go{background:#2ea043;color:#08130a}.lg-cau{background:#d29922;color:#1a1300}.lg-av{background:#3a4150;color:#c9d1d9}
  .ev-odds{margin-top:12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .ev-rr{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
  .ev-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
  .ev-chip{background:var(--panel2);border-radius:9px;padding:8px 6px;text-align:center;font-size:12px}
  .ev-chip .kk{font-size:11px}.ev-chip .vv{font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
  .ev-reason{margin-top:11px;font-size:12.8px;color:#c9d1d9}
  .ev-act{margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .ev-cta{background:var(--accent);color:#fff;font-weight:700;padding:10px 16px;border-radius:11px;border:none;cursor:pointer;font-size:13.5px}
  .ev-cta.ghost{background:var(--panel2);color:var(--muted)}
  .ev-dis{font-size:11px;color:var(--muted)}
  .verdict{background:var(--panel);border:1px solid var(--border);border-radius:14px;
    padding:18px 20px;margin:14px 0;position:sticky;top:10px;z-index:5}
  .vhead{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px}
  .vlabel{font-size:26px;font-weight:700}
  .vmeta{color:var(--muted);font-size:12.5px}
  .bar{height:26px;border-radius:13px;margin:14px 0 6px;position:relative;
    background:linear-gradient(90deg,var(--short) 0%,#3a3f4b 50%,var(--long) 100%);opacity:.9}
  .bar .mid{position:absolute;left:50%;top:-4px;bottom:-4px;width:2px;background:#000a}
  .bar .mark{position:absolute;top:-5px;width:4px;height:36px;background:#fff;border-radius:2px;
    box-shadow:0 0 6px #000;transition:left .25s}
  .scale{display:flex;justify-content:space-between;color:var(--muted);font-size:11.5px}
  .tally{margin-top:10px;font-size:13px;color:var(--muted)} .tally b{color:var(--txt)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-top:16px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;
    cursor:pointer;transition:border-color .15s;position:relative}
  .card:hover{border-color:#3d4757}
  .card.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .card.na{opacity:.6;cursor:not-allowed}
  .chead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .cname{font-weight:700;font-size:15px} .cschool{color:var(--muted);font-size:12px}
  .badge{font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .b-long{background:rgba(46,160,67,.18);color:#4ac26b;border:1px solid #2ea04366}
  .b-short{background:rgba(229,83,75,.18);color:#f0776f;border:1px solid #e5534b66}
  .b-neu{background:rgba(110,118,129,.18);color:#adb6c0;border:1px solid #6e768166}
  .b-warn{background:rgba(210,153,34,.18);color:#e3c07a;border:1px solid #d2992266}
  .b-na{background:rgba(72,79,88,.25);color:#8b949e;border:1px solid #484f58}
  .conf{font-size:11.5px;color:var(--muted);margin-top:2px}
  .reasons{margin:10px 0 0;padding:0;list-style:none}
  .reasons li{font-size:12.8px;color:#c9d1d9;padding-left:14px;position:relative;margin:3px 0}
  .reasons li:before{content:"·";position:absolute;left:3px;color:var(--muted)}
  .lvls{margin-top:10px;font-size:12.3px;border-top:1px dashed var(--border);padding-top:8px}
  .lvls div{margin:2px 0} .lvls .k{color:var(--muted);display:inline-block;width:38px}
  .lvls .entry{color:#cfe6d6}.lvls .stop{color:#f0b3ae}.lvls .tgt{color:#a9d3ff}.lvls .inv{color:#e3c07a}
  .note{margin-top:8px;font-size:11.8px;color:var(--muted);font-style:italic}
  .wrow{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
  .wrow label{font-size:12px;color:var(--muted);white-space:nowrap}
  .wrow input[type=range]{flex:1;accent-color:var(--accent)}
  .wval{font-variant-numeric:tabular-nums;font-weight:700;width:20px;text-align:right}
  .selmark{position:absolute;top:10px;right:12px;font-size:12px;color:var(--accent);opacity:0}
  .card.sel .selmark{opacity:1}
  /* 三栏分立: 多/空/中 */
  .groups{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:16px;align-items:start}
  @media(max-width:820px){.groups{grid-template-columns:1fr}}
  .col{min-width:0}
  .colhead{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;padding:8px 10px;border-radius:10px;margin-bottom:8px}
  .colhead .cnt{font-size:12px;color:var(--muted);font-weight:600}
  .ch-long{background:rgba(46,160,67,.14);color:#4ac26b;border:1px solid #2ea04344}
  .ch-short{background:rgba(229,83,75,.14);color:#f0776f;border:1px solid #e5534b44}
  .ch-neu{background:rgba(110,118,129,.14);color:#adb6c0;border:1px solid #6e768144}
  .col .card{margin-bottom:10px}
  .col.empty{opacity:.5;font-size:12px;color:var(--muted);padding:10px;text-align:center;border:1px dashed var(--border);border-radius:10px}
  .track{display:inline-flex;align-items:center;gap:5px;margin-left:6px;font-size:11px;color:var(--accent);cursor:pointer;white-space:nowrap}
  .statmini{display:flex;gap:8px;margin-top:8px;font-size:11px;color:var(--muted);border-top:1px dashed var(--border);padding-top:7px}
  .statmini b{color:var(--txt);font-variant-numeric:tabular-nums}
  .statmini .win{color:#4ac26b}.statmini .neg{color:#f0776f}
  /* 详情弹层 */
  .modal{position:fixed;inset:0;background:#0009;display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
  .modal.on{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--border);border-radius:16px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;padding:18px 20px}
  .sheet h3{margin:0 0 2px;font-size:17px}
  .sheet .ctx{color:var(--muted);font-size:12.5px;margin-bottom:12px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
  .kpi{background:var(--panel2);border-radius:10px;padding:9px;text-align:center}
  .kpi .n{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
  .kpi .l{font-size:10.5px;color:var(--muted);margin-top:2px}
  .tf-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
  .tf-tbl th,.tf-tbl td{padding:6px 8px;border-bottom:1px solid var(--border);text-align:right}
  .tf-tbl th:first-child,.tf-tbl td:first-child{text-align:left}
  .tf-tbl .cur{background:rgba(59,130,246,.12)}
  .closeX{float:right;cursor:pointer;color:var(--muted);font-size:18px;line-height:1}
  .demoflag{font-size:11px;color:#e3c07a;background:#2d2418;border:1px solid #5c4a1f;border-radius:8px;padding:6px 10px;margin-top:12px}
  /* 顶部导航 + 分页 */
  .nav{display:flex;gap:6px;margin:10px 0 4px;border-bottom:1px solid var(--border)}
  .nav a{padding:9px 16px;font-size:14px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-weight:600}
  .nav a.on{color:var(--txt);border-bottom-color:var(--accent)}
  .page{display:none} .page.on{display:block}
  /* 雷达 */
  .rrow{display:grid;grid-template-columns:110px 1fr 92px 88px 70px;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:11px 14px;margin-bottom:9px;cursor:pointer}
  .rrow:hover{border-color:var(--accent)}
  .rrow .rs{font-weight:700} .rrow .rmini{font-size:11px;color:var(--muted)}
  .rpill{font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;text-align:center;white-space:nowrap}
  .rp-long{background:rgba(46,160,67,.18);color:#4ac26b}.rp-short{background:rgba(229,83,75,.18);color:#f0776f}.rp-neu{background:rgba(110,118,129,.18);color:#adb6c0}
  .cbar2{height:7px;border-radius:5px;background:linear-gradient(90deg,var(--short),#3a3f4b,var(--long));position:relative}
  .cbar2 i{position:absolute;top:-3px;width:3px;height:13px;background:#fff;border-radius:2px}
  /* 成长/记录 */
  .jrow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12.5px}
  .jbtns button{background:var(--panel2);border:1px solid var(--border);color:var(--txt);border-radius:7px;padding:4px 8px;font-size:11px;cursor:pointer;margin-left:4px}
  .jbtns button.win{color:#4ac26b}.jbtns button.lose{color:#f0776f}
  .mrow{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid var(--border);font-size:13px}
  footer{color:var(--muted);font-size:12px;margin:22px 0 10px;text-align:center}

</head>

    <span class="vmeta" id="nextTick"></span>
  </div>

  <!-- EV 体检卡 -->
  <div id="evcard" class="evcard"></div>

  <div class="levels" id="levels"></div>

  <div class="verdict">
    <div class="vhead">
      <div><span class="vlabel" id="vlabel">—</span><span class="vmeta" id="vscore"></span></div>

    <div class="bar"><div class="mid"></div><div class="mark" id="mark" style="left:50%"></div></div>
    <div class="scale"><span>◀ 偏空</span><span>中性</span><span>偏多 ▶</span></div>
    <div class="tally" id="tally"></div>
  </div>

  <div class="toolbar">
    <button class="btn" onclick="selectAll(true)">全选</button>
    <button class="btn" onclick="selectAll(false)">全不选</button>
    <button class="btn" onclick="selectTech()">只选技术派</button>
    <button class="btn" onclick="resetWeights()">权重重置</button>
    <button class="btn" onclick="clearSaved()">清除偏好</button>
  </div>

  <div class="grid" id="grid"></div>
  </div><!-- /pDesk -->

  <div class="page" id="pRadar">
    <div class="ctrls"><button class="btn primary" id="scanBtn">↻ 扫描自选</button>
      <span class="vmeta" id="scanStatus">按「赔率 × 共识」排序 · 点行跳到决策台</span></div>
    <div id="radarBox" style="margin-top:12px"></div>
  </div>

  <div class="page" id="pGrowth"><div id="growthBox" style="margin-top:12px"></div></div>

  <div class="page" id="pMe"><div id="meBox" style="margin-top:12px"></div></div>

  <footer id="deskFoot">专家按立场分三栏 · 点卡片=选中/取消 · 点「战绩 ›」看该专家在此标的×周期的表现 · 数据源 Binance→OKX→Kraken</footer>
</div>

/* ============ 工具 & 指标 ============ */
const fmt=n=>(n==null||isNaN(n))?"—":Number(n).toLocaleString(undefined,{maximumFractionDigits:0});
const col=(c,i)=>c.map(r=>r[i]);
function ema(v,n){let k=2/(n+1),e=v[0];for(let i=1;i<v.length;i++)e=v[i]*k+e*(1-k);return e;}
function emaSeries(v,n){let k=2/(n+1),e=v[0],out=[e];for(let i=1;i<v.length;i++){e=v[i]*k+e*(1-k);out.push(e);}return out;}
function rsi(cl,n=14){if(cl.length<n+1)return 50;let g=0,l=0;
  for(let i=1;i<=n;i++){let ch=cl[i]-cl[i-1];g+=Math.max(ch,0);l+=Math.max(-ch,0);}
  let ag=g/n,al=l/n;
  for(let i=n+1;i<cl.length;i++){let ch=cl[i]-cl[i-1];ag=(ag*(n-1)+Math.max(ch,0))/n;al=(al*(n-1)+Math.max(-ch,0))/n;}
  return 100-100/(1+(al?ag/al:999));}
function macdHist(cl,f=12,s=26,sig=9){let ef=emaSeries(cl,f),es=emaSeries(cl,s),
  line=ef.map((a,i)=>a-es[i]),sg=emaSeries(line,sig);return line.map((a,i)=>a-sg[i]);}
function atr(c,n=14){let trs=[];for(let i=1;i<c.length;i++){let h=c[i][2],l=c[i][3],pc=c[i-1][4];
  trs.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));}let a=trs.slice(0,n).reduce((x,y)=>x+y,0)/n;
  for(let i=n;i<trs.length;i++)a=(a*(n-1)+trs[i])/n;return a;}
function boll(cl,n=20,k=2){let s=cl.slice(-n),m=s.reduce((x,y)=>x+y,0)/n,
  sd=Math.sqrt(s.reduce((x,y)=>x+(y-m)**2,0)/n);return[m-k*sd,m,m+k*sd];}
function swings(c,lb=2){let h=col(c,2),l=col(c,3),hi=[],lo=[];
  for(let i=lb;i<c.length-lb;i++){let wh=h.slice(i-lb,i+lb+1),wl=l.slice(i-lb,i+lb+1);
    if(h[i]===Math.max(...wh))hi.push([i,h[i]]);if(l[i]===Math.min(...wl))lo.push([i,l[i]]);}
  return[hi,lo];}
const mn=a=>Math.min(...a), mx=a=>Math.max(...a);

const BINANCE_IV={"1m":"1m","5m":"5m","15m":"15m","1h":"1h","4h":"4h","1d":"1d"};

  "1d": {"1d":"1d","4h":"1d","1h":"4h","15m":"1h"},

  const canon=slots()["4h"];

const KRAKEN_PAIR={"BTCUSDT":"XBTUSD","ETHUSDT":"ETHUSD","SOLUSDT":"SOLUSD","XRPUSDT":"XRPUSD"};
function okxInst(sym){return sym.replace("USDT","-USDT");}       // BTC-USDT

async function jget(url,ms=9000){const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);
  try{const r=await fetch(url,{signal:c.signal});if(!r.ok)throw new Error(r.status);return await r.json();}
  finally{clearTimeout(t);} }

async function fromBinance(sym){
  const out={};const sl=slots();
  for(const tf in sl){
    const d=await jget(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${BINANCE_IV[sl[tf]]}&limit=200`);
    out[tf]=d.map(r=>[r[0]/1000,+r[1],+r[2],+r[3],+r[4],+r[5]]);
  }
  return out;
}
async function fromOKX(sym){
  const out={};const inst=okxInst(sym);const sl=slots();
  for(const tf in sl){
    const d=await jget(`https://www.okx.com/api/v5/market/candles?instId=${inst}&bar=${OKX_IV[sl[tf]]}&limit=200`);
    if(!d.data||!d.data.length)throw new Error("okx empty");
    out[tf]=d.data.map(r=>[+r[0]/1000,+r[1],+r[2],+r[3],+r[4],+r[5]]).reverse();
  }
  return out;
}
async function fromKraken(sym){
  const pair=KRAKEN_PAIR[sym];if(!pair)throw new Error("kraken no pair");
  const out={};const sl=slots();
  for(const tf in sl){
    const d=await jget(`https://api.kraken.com/0/public/OHLC?pair=${pair}&interval=${KRAKEN_IV[sl[tf]]}`);
    const key=Object.keys(d.result).find(k=>k!=="last");
    out[tf]=d.result[key].slice(-200).map(r=>[+r[0],+r[1],+r[2],+r[3],+r[4],+r[6]]);
  }
  return out;
}

const isCrypto=s=>/USDT$/.test(s);

const YMAP={"1m":["1m","5d"],"5m":["5m","1mo"],"15m":["15m","1mo"],"1h":["60m","3mo"],"4h":["1d","1y"],"1d":["1d","2y"]};
async function fromYahoo(sym){
  const t=YTICK[sym]||sym, out={}, sl=slots();
  for(const k in sl){
    const canon=sl[k], mp=YMAP[canon]||["1d","1y"];
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(t)}?range=${mp[1]}&interval=${mp[0]}`;
    const prox=`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const d=await jget(prox,13000);
    const r=d&&d.chart&&d.chart.result&&d.chart.result[0];
    if(!r||!r.timestamp) throw new Error("Yahoo空数据");
    const q=r.indicators.quote[0], ts=r.timestamp, cnd=[];
    for(let i=0;i<ts.length;i++){ if(q.close[i]==null)continue;
      cnd.push([ts[i], q.open[i]??q.close[i], q.high[i]??q.close[i], q.low[i]??q.close[i], q.close[i], q.volume[i]||0]); }
    if(cnd.length<70) throw new Error("Yahoo数据不足");
    out[k]=cnd.slice(-320);
  }
  return out;
}
async function getOHLC(sym){
  if(!isCrypto(sym)){
    try{ const d=await fromYahoo(sym); return {name:"Yahoo",data:d}; }
    catch(e){ throw new Error("美股/大宗获取失败(CORS代理可能限流,稍后重试): "+(e.message||e)); }
  }
  const chain=[["Binance",fromBinance],["OKX",fromOKX],["Kraken",fromKraken]];
  let lastErr;
  for(const [name,fn] of chain){
    try{const d=await fn(sym);return {name,data:d};}catch(e){lastErr=e;}
  }
  throw lastErr||new Error("all sources failed");
}
async function getFunding(sym){

}

function snapshot(c){
  const closes=col(c,4),vols=col(c,5),price=closes[closes.length-1];
  const [bl,bm,bu]=boll(closes);const[hi,lo]=swings(c);const mh=macdHist(closes);
  return{price,e20:ema(closes,20),e50:ema(closes,50),rsi:rsi(closes),
    bl,bm,bu,atr:atr(c),vlast:vols[vols.length-1],vavg:vols.slice(-20).reduce((x,y)=>x+y,0)/20,
    dcHi:mx(col(c,2).slice(-20)),dcLo:mn(col(c,3).slice(-20)),
    hi,lo,closes,mh};
}

     e20:S["4h"].e20,e50:S["4h"].e50,atr4:S["4h"].atr,

/* ===== 关键位检测(支撑阻力): 摆动聚类 + 整数关口 ; 供 关键位专家 与 EV卡 复用 ===== */
function niceStep(p){return p>=10000?1000:p>=1000?100:p>=100?10:p>=10?1:Math.max(0.01,+(p*0.01).toFixed(4));}
function keyLevels(c,end,a,win){win=win||120;const lo=Math.max(3,end-win),pts=[];
  for(let i=lo;i<=end-2;i++){if(i-2<0)continue;
    const H=[c[i-2][2],c[i-1][2],c[i][2],c[i+1][2],c[i+2][2]],Lw=[c[i-2][3],c[i-1][3],c[i][3],c[i+1][3],c[i+2][3]];
    if(c[i][2]===Math.max(...H))pts.push(c[i][2]);if(c[i][3]===Math.min(...Lw))pts.push(c[i][3]);}
  const price=c[end][4],tol=Math.max(0.3*a,price*0.0015);pts.sort((x,y)=>x-y);const cl=[];
  pts.forEach(p=>{if(cl.length&&Math.abs(p-cl[cl.length-1].p)<=tol){const o=cl[cl.length-1];o.p=(o.p*o.s+p)/(o.s+1);o.s++;}else cl.push({p,s:1});});
  const step=niceStep(price),base=Math.round(price/step)*step;
  for(let k=-3;k<=3;k++){const rp=base+k*step;if(rp>0){const hit=cl.find(o=>Math.abs(o.p-rp)<=tol);if(hit)hit.s=Math.max(hit.s,1.2);else cl.push({p:rp,s:1.2});}}
  cl.sort((x,y)=>x.p-y.p);return cl;}
function nearestLv(lv,price){let sup=null,res=null;for(const o of lv){if(o.p<price)sup=o;else if(o.p>price&&!res)res=o;}return{sup,res};}
function eKeyLevel(){
  const c=window.DALL&&window.DALL["4h"];if(!c||c.length<66)return card("关键位","支撑阻力(S/R)","中性","低",["数据不足"],"—","—",["—"],"—");
  const price=L.price,a=L.atr4||price*0.01,lv=keyLevels(c,c.length-1,a),{sup,res}=nearestLv(lv,price);
  if(sup&&res){
    if((price-sup.p)<=0.5*a){const stop=sup.p-0.5*a,tgt=res.p,rr=(tgt-price)/(price-stop);
      if(rr>=1.2)return card("关键位","支撑阻力(S/R)","偏多","中",
        [`贴近支撑 ${f(sup.p)}(聚集${sup.s.toFixed(0)}次)`,`上方阻力 ${f(res.p)}，结构赔率约 1:${rr.toFixed(1)}`,"止损贴位置外、目标下一关键位"],
        `${f(sup.p)}–${f(sup.p+0.3*a)} 支撑反弹`,`${f(stop)}(破位失效)`,[f(res.p)],`收盘跌破 ${f(sup.p)}`);}
    if((res.p-price)<=0.5*a){const stop=res.p+0.5*a,tgt=sup.p,rr=(price-tgt)/(stop-price);
      if(rr>=1.2)return card("关键位","支撑阻力(S/R)","偏空","中",
        [`贴近阻力 ${f(res.p)}(聚集${res.s.toFixed(0)}次)`,`下方支撑 ${f(sup.p)}，结构赔率约 1:${rr.toFixed(1)}`],
        `${f(res.p-0.3*a)}–${f(res.p)} 阻力做空`,`${f(stop)}`,[f(sup.p)],`收盘站上 ${f(res.p)}`);}
    return card("关键位","支撑阻力(S/R)","中性","低",
      [`价格${f(price)}夹在关键位之间`,`支撑 ${f(sup.p)} / 阻力 ${f(res.p)}`,"等触及关键位再动手"],
      `回踩 ${f(sup.p)} 或上冲 ${f(res.p)}`,"—",[`支撑${f(sup.p)} / 阻力${f(res.p)}`],"—");
  }
  return card("关键位","支撑阻力(S/R)","中性","低",["关键位不足"],"—","—",["—"],"—");
}

function curveSVG(curve){

  const pts=curve.map((v,i)=>{const x=pad+i/(curve.length-1)*(w-2*pad);const y=h-pad-(v-mn)/rg*(h-2*pad);return x.toFixed(1)+','+y.toFixed(1);}).join(' ');

function renderEV(nl,ns,nn){
  const el=document.getElementById("evcard");

  const price=L.price, a=L.atr4||price*0.01, net=nl-ns;
  const acct=Math.max(1,+ (document.getElementById("acct").value||10000));
  const rp=Math.max(0.1,+(document.getElementById("riskpct").value||1))/100;
  let dir = net>=2?"long":(net<=-2?"short":"flat");
  // 构造统一交易计划: 优先用"关键位"定止损/目标(贴真实结构, 提高赔率), 无则回退
  let entry=price, stop, tgt, useKL=false;
  let KL=null; try{const c=window.DALL&&window.DALL["4h"]; if(c&&c.length>66) KL=nearestLv(keyLevels(c,c.length-1,a),price);}catch(e){}
  if(dir==="long"){

  }else if(dir==="short"){

    else { stop=price+1.5*a; tgt=(L.dcLo<price-0.8*a)?L.dcLo:price-3*a; }
    if(stop<=price) stop=price+1.5*a;
  }
  let riskD=Math.abs(entry-stop), rewD=dir==="flat"?0:Math.abs(tgt-entry);

      <div class="ev-light ${lgCls}">${light}</div></div>

function btStat(R){if(!R.length)return null;const w=R.filter(x=>x>0),gp=w.reduce((x,y)=>x+y,0),gl=Math.abs(R.filter(x=>x<=0).reduce((x,y)=>x+y,0));
  let eq=0,curve=[];R.forEach(r=>{eq+=r;curve.push(Math.round(eq*100)/100);});
  if(curve.length>40){const st=curve.length/40;const cc=[];for(let i=0;i<40;i++)cc.push(curve[Math.min(curve.length-1,Math.floor(i*st))]);curve=cc;}
  return {win:Math.round(1000*w.length/R.length)/10,ev:Math.round(1000*R.reduce((x,y)=>x+y,0)/R.length)/1000,pf:gl>0?Math.round(100*gp/gl)/100:9.99,trades:R.length,curve};}
function runBacktestAll(){ // 对当前已加载的4个槽位序列各跑一遍, 填入对应真实周期
  if(!window.DALL)return;const k=symKey(curSym);LIVESTATS[k]=LIVESTATS[k]||{};const sl=slots();
  for(const slot in sl){const canon=sl[slot],c=window.DALL[slot];if(!c||c.length<70)continue;
    const P=btPre(c),bucket={};for(const name in BTCFG){const st=btStat(btSimulate(c,P,name));if(st)bucket[name]=st;}
    LIVESTATS[k][canon]=bucket;}
}
function getStat(name,sym,tf){const k=symKey(sym);
  if(LIVESTATS[k]&&LIVESTATS[k][tf]&&LIVESTATS[k][tf][name])return LIVESTATS[k][tf][name];
  try{const s=REALSTATS.stats[name][k][tf];return s?{win:s.win,ev:s.ev,pf:s.pf,trades:s.n,curve:s.curve||[]}:null;}catch(e){return null;}}

/* ============ 主流程 ============ */
let curSym="BTCUSDT", timer=null, ticking=null, ws=null;
window.DALL=null; window.CURSRC="";
function setStatus(kind,txt){document.getElementById("sdot").className="dot "+kind;document.getElementById("stext").textContent=txt;}
async function refresh(){
  setStatus("load",`加载 ${curSym} · ${curTF} 数据中…`);
  try{
    const [ohlc,fund]=await Promise.all([getOHLC(curSym),getFunding(curSym)]);
    FUND=fund; window.DALL=ohlc.data; window.CURSRC=ohlc.name; buildLevels(ohlc.data);
    runBacktestAll();                       // 浏览器端当场算真实战绩
    CARDS=ROSTER.map(fn=>fn());
    ensureState(); renderLevels(ohlc.name); renderCards(); recompute();
    document.getElementById("tfLabel").textContent=curTF;
    setStatus("ok",`数据就绪 · ${curTF} · OHLC@${ohlc.name}`+(fund?` · 费率@${fund.src}`:` · 费率不可用`));
  }catch(e){
    setStatus("bad","数据获取失败:"+(e&&e.message||e)+"（可能是网络/地区限制，稍后重试或换网络）");
  }
}
/* ---- WebSocket 实时(Binance): 主图周期K线流, tick更新价格/EV, 收盘全量重算 ---- */
function closeWS(){ if(ws){try{ws.onmessage=null;ws.close();}catch(e){} ws=null;} }
function connectWS(){
  closeWS();
  if(!document.getElementById("wsChk").checked) return;
  if(!isCrypto(curSym)) return;   // Binance WS 仅加密; 美股/大宗走轮询
  const base=BINANCE_IV[slots()["4h"]];
  try{
    ws=new WebSocket(`wss://stream.binance.com:9443/ws/${curSym.toLowerCase()}@kline_${base}`);
    ws.onmessage=e=>{ const m=JSON.parse(e.data); if(m&&m.k) applyLiveKline(m.k); };
    ws.onopen=()=>{ document.getElementById("gen").textContent="● 实时 "+new Date().toLocaleTimeString(); };
  }catch(e){}
}
function applyLiveKline(k){
  if(!window.DALL) return;
  const c=[k.t/1000,+k.o,+k.h,+k.l,+k.c,+k.v], arr=window.DALL["4h"];
  if(arr.length && arr[arr.length-1][0]===c[0]) arr[arr.length-1]=c;
  else { arr.push(c); if(arr.length>220) arr.shift(); }
  if(L) L.price=+k.c;
  document.getElementById("price").textContent=fmt(+k.c);
  document.getElementById("gen").textContent="● 实时 "+new Date().toLocaleTimeString();
  if(k.x){ // 该周期收盘 → 全量重算(正式信号)+ 更新战绩
    buildLevels(window.DALL); runBacktestAll(); CARDS=ROSTER.map(fn=>fn()); ensureState();
    renderLevels("WS·"+(window.CURSRC||"Binance")); renderCards();
  }
  recompute(); // 每tick用最新价刷新EV/共识(预览)
}
function scheduleAuto(){
  if(timer)clearInterval(timer); if(ticking)clearInterval(ticking);
  if(!document.getElementById("autoChk").checked){document.getElementById("nextTick").textContent="";return;}
  const iv=Math.max(15,+document.getElementById("ivsel").value||60);
  let left=iv;
  const wsOn=document.getElementById("wsChk").checked;
  const tip=()=>`(${left}s 后回补 · ${wsOn?"WS实时中":"轮询"} · 宏观日更)`;
  document.getElementById("nextTick").textContent=tip();
  ticking=setInterval(()=>{left--;if(left<0)left=iv;document.getElementById("nextTick").textContent=tip();},1000);
  timer=setInterval(refresh,iv*1000);
}
async function reload(){ await refresh(); connectWS(); scheduleAuto(); }
document.getElementById("refreshBtn").onclick=reload;
document.getElementById("autoChk").onchange=scheduleAuto;
document.getElementById("ivsel").onchange=scheduleAuto;
document.getElementById("wsChk").onchange=()=>{connectWS();scheduleAuto();};
document.getElementById("symsel").onchange=e=>{curSym=e.target.value;reload();};
document.getElementById("tfsel").onchange=e=>{curTF=e.target.value;document.getElementById("tfLabel").textContent=curTF;reload();};
document.getElementById("acct").oninput=()=>recompute();
document.getElementById("riskpct").oninput=()=>recompute();

/* ============ 多页: 雷达 / 成长 / 我的 ============ */
function showPage(p){
  const map={desk:'pDesk',radar:'pRadar',growth:'pGrowth',me:'pMe'};
  for(const k in map){document.getElementById(map[k]).classList.toggle('on',k===p);document.getElementById('nav-'+k).classList.toggle('on',k===p);}
  const f=document.getElementById('deskFoot'); if(f)f.style.display=p==='desk'?'':'none';
  if(p==='radar')renderRadar(); if(p==='growth')renderGrowth(); if(p==='me')renderMe();
}
// ---- 自选 & 雷达 ----
const DEFAULT_WATCH=["BTCUSDT","ETHUSDT","SOLUSDT","BNBUSDT","XRPUSDT","DOGEUSDT"];
function getWatch(){try{return JSON.parse(localStorage.getItem('watch'))||DEFAULT_WATCH;}catch(e){return DEFAULT_WATCH;}}
function setWatch(a){try{localStorage.setItem('watch',JSON.stringify(a));}catch(e){}}
let RADAR=[], scanning=false;
async function scanRadar(){
  if(scanning)return; scanning=true;
  const st=document.getElementById('scanStatus'); const list=getWatch().filter(isCrypto); RADAR=[];
  for(let i=0;i<list.length;i++){const sym=list[i]; st.textContent=`扫描中… ${i}/${list.length} (${sym.replace('USDT','')})`;
    try{const o=await getOHLC(sym); const D=o.data; window.DALL=D; buildLevels(D);
      const cards=ROSTER.map(fn=>fn()); let nl=0,ns=0; cards.forEach(c=>{const t=dirType(c.dir);if(t==='long')nl++;else if(t==='short')ns++;});
      const net=nl-ns, price=L.price, a=L.atr4||price*0.01; let dir=net>=2?'long':(net<=-2?'short':'flat'), rr=0;
      if(dir!=='flat'){let KL=null;try{KL=nearestLv(keyLevels(D["4h"],D["4h"].length-1,a),price);}catch(e){} let stop,tgt;
        if(dir==='long'){if(KL&&KL.sup&&KL.res&&KL.res.p>price+0.3*a){stop=KL.sup.p-0.4*a;tgt=KL.res.p;}else{stop=price-1.5*a;tgt=price+3*a;}if(stop>=price)stop=price-1.5*a;}
        else{if(KL&&KL.sup&&KL.res&&KL.sup.p<price-0.3*a){stop=KL.res.p+0.4*a;tgt=KL.sup.p;}else{stop=price+1.5*a;tgt=price-3*a;}if(stop<=price)stop=price+1.5*a;}
        rr=Math.abs(tgt-price)/Math.abs(price-stop);}
      RADAR.push({sym,dir,nl,ns,net,rr,price});
    }catch(e){RADAR.push({sym,err:true});}
  }
  RADAR.sort((x,y)=>radScore(y)-radScore(x));
  st.textContent='完成 · '+new Date().toLocaleTimeString()+' · 点行跳决策台';
  scanning=false; renderRadar(); reload();  // 恢复当前决策台
}
function radScore(r){if(r.err||r.dir==='flat')return -1;return Math.abs(r.net)*Math.min(r.rr,4);}
function renderRadar(){
  const box=document.getElementById('radarBox');
  if(!RADAR.length){box.innerHTML='<div class="col empty">点上方「扫描自选」开始——浏览器逐个直连交易所、跑完整评审团+EV，约几秒。</div>';return;}
  box.innerHTML=RADAR.map(r=>{
    if(r.err)return `<div class="rrow" style="opacity:.5"><span class="rs">${r.sym.replace('USDT','')}</span><span class="rmini">获取失败</span><span></span><span></span><span></span></div>`;
    const dc=r.dir==='long'?'rp-long':r.dir==='short'?'rp-short':'rp-neu', dt=r.dir==='long'?'▲做多':r.dir==='short'?'▼做空':'●观望';
    const pct=Math.max(2,Math.min(98,((r.net/8)*0.5+0.5)*100));
    return `<div class="rrow" onclick="gotoSym('${r.sym}')">
      <div><div class="rs">${r.sym.replace('USDT','')}</div><div class="rmini">${fmt(r.price)}</div></div>
      <div><div class="cbar2"><i style="left:${pct}%"></i></div><div class="rmini" style="margin-top:5px">共识 ${r.nl}多 / ${r.ns}空</div></div>
      <span class="rpill ${dc}">${dt}</span>
      <span style="text-align:right">${r.dir!=='flat'?'赔率 1:'+r.rr.toFixed(1):'—'}</span>
      <span style="text-align:right;color:var(--accent)">看 ›</span></div>`;
  }).join('');
}
function gotoSym(sym){curSym=sym;const sel=document.getElementById('symsel');if(sel)sel.value=sym;showPage('desk');reload();}
// ---- 交易日志 & 成长 ----
function getJournal(){try{return JSON.parse(localStorage.getItem('journal'))||[];}catch(e){return[];}}
function setJournal(a){try{localStorage.setItem('journal',JSON.stringify(a));}catch(e){}}
function journalAdd(p){const j=getJournal();j.push({id:Date.now(),sym:p.sym,tf:curTF,dir:p.dir,entry:+p.entry,stop:+p.stop,tgt:+p.tgt,rr:+p.rr,posPct:+p.posPct,time:new Date().toISOString(),status:'open',R:null,hadStop:!!(p.stop&&p.stop!=='—')});setJournal(j);}
function closeTrade(id,o){const j=getJournal(),t=j.find(x=>x.id===id);if(!t)return;t.status=o;t.R=o==='win'?t.rr:o==='lose'?-1:0;setJournal(j);renderGrowth();}
function delTrade(id){setJournal(getJournal().filter(x=>x.id!==id));renderGrowth();}
function jrow(t,isOpen){
  const dc=t.dir==='long'?'#4ac26b':'#f0776f', dt=t.dir==='long'?'做多':'做空';
  const rtag=t.status==='open'?'':`<b style="color:${t.R>0?'#4ac26b':t.R<0?'#f0776f':'#8b949e'}">${t.R>0?'+':''}${t.R}R</b>`;
  const btns=isOpen?`<span class="jbtns"><button class="win" onclick="closeTrade(${t.id},'win')">赢</button><button class="lose" onclick="closeTrade(${t.id},'lose')">输</button><button onclick="closeTrade(${t.id},'be')">平</button></span>`
    :`<span class="jbtns">${rtag} <button onclick="delTrade(${t.id})">删</button></span>`;
  return `<div class="jrow"><div><b style="color:${dc}">${dt}</b> ${t.sym.replace('USDT','')} · ${t.tf} · 赔率1:${(+t.rr||0).toFixed(1)}<div class="rmini">进${fmt(t.entry)} 损${fmt(t.stop)} 标${fmt(t.tgt)}</div></div>${btns}</div>`;
}
function behaviorTip(ws,rr,ev){let t=[];if(ws<90)t.push('有交易没设止损——爆仓头号原因，坚持每笔设止损');if(rr<60)t.push('不少交易赔率<1.5，进场前多问"这笔值不值"');if(ev<0&&!t.length)t.push('期望仍为负：检查是否砍盈利/扛亏损');if(!t.length)t.push('纪律不错：继续让赢的更大、把亏的锁小');return t.join('；');}
function renderGrowth(){
  const box=document.getElementById('growthBox'), j=getJournal();
  const closed=j.filter(t=>t.status!=='open'), open=j.filter(t=>t.status==='open');
  const Rs=closed.map(t=>t.R), wins=Rs.filter(r=>r>0);
  const win=Rs.length?Math.round(1000*wins.length/Rs.length)/10:0, ev=Rs.length?Math.round(1000*Rs.reduce((a,b)=>a+b,0)/Rs.length)/1000:0;
  const totR=Math.round(Rs.reduce((a,b)=>a+b,0)*100)/100;
  const withStop=j.length?Math.round(100*j.filter(t=>t.hadStop).length/j.length):0, goodRR=j.length?Math.round(100*j.filter(t=>+t.rr>=1.5).length/j.length):0;
  let eq=0; const curve=closed.map(t=>{eq+=t.R;return Math.round(eq*100)/100;});
  const disc=Math.round(withStop*0.6+goodRR*0.4);
  box.innerHTML=`
   <div class="kpis">
     <div class="kpi"><div class="n" style="color:${ev>=0?'#4ac26b':'#f0776f'}">${ev>=0?'+':''}${ev}R</div><div class="l">每笔期望</div></div>
     <div class="kpi"><div class="n">${win}%</div><div class="l">胜率</div></div>
     <div class="kpi"><div class="n" style="color:${totR>=0?'#4ac26b':'#f0776f'}">${totR>=0?'+':''}${totR}R</div><div class="l">累计</div></div>
     <div class="kpi"><div class="n">${disc}</div><div class="l">纪律分</div></div></div>
   ${closed.length?('<div class="ctx" style="margin:6px 0">累计盈亏(R) · 你的成长曲线</div>'+curveSVG(curve.length?curve:[0])):''}
   <div class="gcard" style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:12px">
     <div style="font-weight:700;margin-bottom:8px">行为体检</div>
     <div class="rmini">设了止损 <b style="color:#e6edf3">${withStop}%</b> · 赔率≥1.5 <b style="color:#e6edf3">${goodRR}%</b> · 已记录 <b style="color:#e6edf3">${j.length}</b> 笔</div>
     <div class="rmini" style="margin-top:7px">${j.length?behaviorTip(withStop,goodRR,ev):'从决策台点「按此纪律记录」开始记录你的交易，这里会长出你真实的成长曲线。'}</div></div>
   ${open.length?('<div class="ctx" style="margin:12px 0 6px">进行中（结束后点 赢/输/平）</div>'+open.map(t=>jrow(t,true)).join('')):''}
   ${closed.length?('<div class="ctx" style="margin:12px 0 6px">历史</div>'+closed.slice().reverse().map(t=>jrow(t,false)).join('')):''}
   <div class="demoflag" style="margin-top:12px">这是你亲手记录的真实交易战绩（本地保存）。真实、可追溯——比任何回测都有说服力。</div>`;
}
function renderMe(){
  const box=document.getElementById('meBox'), j=getJournal();
  box.innerHTML=`
   <div class="mrow"><span>单笔风险 %</span><input type="number" value="${document.getElementById('riskpct').value}" style="width:60px" onchange="document.getElementById('riskpct').value=this.value;recompute()"></div>
   <div class="mrow"><span>账户 $</span><input type="number" value="${document.getElementById('acct').value}" style="width:96px" onchange="document.getElementById('acct').value=this.value;recompute()"></div>
   <div class="mrow"><span>自选(雷达扫描)</span><span class="rmini">${getWatch().map(s=>s.replace('USDT','')).join(' · ')}</span></div>
   <div class="mrow"><span>编辑自选</span><input value="${getWatch().join(',')}" style="width:210px" onchange="setWatch(this.value.split(',').map(x=>x.trim().toUpperCase()).filter(Boolean));renderMe()"></div>
   <div class="mrow"><span>已记录交易</span><span>${j.length} 笔 <button class="btn" onclick="if(confirm('清空全部交易记录?')){setJournal([]);renderMe();}">清空</button></span></div>
   <div class="mrow"><span>高手偏好</span><button class="btn" onclick="clearSaved()">清除并重置</button></div>
   <div class="demoflag" style="margin-top:12px">全部数据本地保存(localStorage)，不上传。分析推演 · 非投资建议。</div>`;
}
document.getElementById("scanBtn").onclick=scanRadar;

/* 启动 */
reload();
